<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Simple To Do List</title><script defer="defer" src="app.bundle.js"></script></head><body><div class="main-container"><div class="header-wrapper"><div class="header"><h1 class="app-title">To Do List</h1><button type="button" class="add-task-btn">Add Task</button></div></div><dialog id="addNewTask" closedby="any"><form action="#" method="dialog" class="add-task-form"><label for="taskNameInput">Task Name:</label> <input id="taskNameInput" class="task-name-input" maxlength="40" required/> <label for="taskCategorySelect">Category:</label> <select id="taskCategorySelect" class="task-category-select" required><option></option><option value="Add New Category" class="add-new-category-option">Add new category</option></select> <label for="addNewCategoryInput" class="add-new-category-label" style="display:none">New Category:</label> <input id="addNewCategoryInput" class="add-new-category-input" style="display:none" maxlength="40"/> <label for="taskPrioritySelect">Priority:</label> <select id="taskPrioritySelect" class="task-priority-select" required><option value="Low">Low</option><option value="Normal">Normal</option><option value="High">High</option></select> <label for="dueByInput">Due By:</label> <input type="datetime-local" id="dueByInput" class="task-due-by-date-input" required/> <button type="submit" class="submit-task-btn">Add Task</button></form></dialog><dialog id="editTask" closedby="any"><form action="#" method="dialog" class="edit-task-form"><label for="editTaskNameInput">Task Name:</label> <input id="editTaskNameInput" class="edit-task-name-input" maxlength="40" required/> <label for="editTaskCategorySelect">Category:</label> <select id="editTaskCategorySelect" class="edit-task-category-select" required><option></option><option value="Add New Category" class="edit-add-new-category-option">Add new category</option></select> <label
