<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple To Do List</title>
  </head>
  <body>
    <div class="main-container">
      <div class="header-wrapper">
        <div class="header">
          <h1>To Do List</h1>
        </div>
      </div>
      <div class="sidebar-wrapper">
        <div class="sidebar">
          <ul>
            <a href="#"><li>First Menu Item</li></a>
          </ul>
        </div>
      </div>
      <div class="todo-list-container">
        <div class="todo-list-wrapper">
          <div class="list-item-categories">
            <div class="project-name">Category/Project Name</div>
            <div class="task-name">Task Name</div>
            <div class="priority-status">Priority</div>
            <div class="due-by-date">Due By</div>
            <div class="completion-status">Completed</div>
            <div class="created-date">Created On</div>
          </div>
          <div class="todo-list-items">
            <div class="project-name">House</div>
            <div class="task-name">Clean bedroom</div>
            <div class="priority-status">Normal</div>
            <div class="due-by-date">06/17/2026 12:00pm</div>
            <div class="completion-status">Not Completed</div>
            <div class="created-date">6/16/2026 5:00pm</div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
