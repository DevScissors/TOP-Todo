<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple To Do List</title>
  </head>
  <body>
    <div class="main-container">
      <div class="header-wrapper">
        <div class="header">
          <h1>To Do List</h1>
          <button type="button">Add New Task</button>
        </div>
      </div>
      <div class="sidebar-container">
        <nav class="sidebar-wrapper">
          <a class="all-tasks-menu menu" href="#">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <title>home</title>
              <path d="M10,20V14H14V20H19V12H22L12,3L2,12H5V20H10Z" />
            </svg>
            <span class="menu-title">All Tasks</span>
          </a>
          <a class="today-menu menu" href="#">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              width="24"
              height="24"
            >
              <title>calendar-today</title>
              <path
                d="M7,10H12V15H7M19,19H5V8H19M19,3H18V1H16V3H8V1H6V3H5C3.89,3 3,3.9 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V5A2,2 0 0,0 19,3Z"
              />
            </svg>
            <span class="menu-title">Today</span>
          </a>
          <a class="upcoming-menu menu" href="#">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <title>calendar-import</title>
              <path
                d="M12 12L8 16H11V22H13V16H16M19 3H18V1H16V3H8V1H6V3H5C3.9 3 3 3.9 3 5V19C3 20.11 3.9 21 5 21H9V19H5V8H19V19H15V21H19C20.11 21 21 20.11 21 19V5C21 3.9 20.11 3 19 3Z"
              />
            </svg>
            <span class="menu-title">Upcoming</span>
          </a>
          <a class="overdue-menu menu" href="#">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <title>calendar-alert</title>
              <path
                d="M6 1V3H5C3.89 3 3 3.89 3 5V19C3 20.11 3.9 21 5 21H19C20.11 21 21 20.11 21 19V5C21 3.9 20.11 3 19 3H18V1H16V3H8V1H6M5 8H19V19H5V8M11 9V14H13V9H11M11 16V18H13V16H11Z"
              />
            </svg>
            <span class="menu-title">Overdue</span>
          </a>
          <a class="archive-menu menu" href="#">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <title>archive</title>
              <path
                d="M3,3H21V7H3V3M4,8H20V21H4V8M9.5,11A0.5,0.5 0 0,0 9,11.5V13H15V11.5A0.5,0.5 0 0,0 14.5,11H9.5Z"
              />
            </svg>
            <span class="menu-title">Archive</span>
          </a>
        </nav>
      </div>
      <div class="todo-list-container">
        <div class="todo-list-wrapper">
          <div class="list-item-categories">
            <div class="checkbox-select"><input type="checkbox" /></div>
            <div class="task-name">Task Name</div>
            <div class="project-name">Category/Project Name</div>
            <div class="priority-status">Priority</div>
            <div class="due-by-date">Due By</div>
            <div class="completion-status">Completed</div>
            <div class="created-date">Created On</div>
          </div>
          <div class="todo-list-items">
            <div class="completion-toggle"><input type="checkbox" /></div>
            <div class="task-name">Clean bedroom</div>
            <div class="project-name">House</div>
            <div class="priority-status">Normal</div>
            <div class="due-by-date">06/17/2026 12:00pm</div>
            <div class="completion-status">Not Completed</div>
            <div class="created-date">6/16/2026 5:00pm</div>
            <div class="task-options-wrapper">
              <div class="delete-task">Delete</div>
              <div class="archive-task">Archive</div>
              <div class="edit-task">Edit</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
