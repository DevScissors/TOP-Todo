<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple To Do List</title>
  </head>
  <body>
    <div class="main-container">
      <div class="header-wrapper">
        <div class="header">
          <h1 class="app-title">To Do List</h1>
          <button type="button" class="new-task-btn">Add Task</button>
          <dialog id="addNewTask" closedby="any">
            <form action="#" method="dialog" class="add-task-form">
              <label for="taskNameInput">
                Task Name:
                <input
                  type="text"
                  id="taskNameInput"
                  class="task-name-input"
                  required
                />
              </label>
              <label for="taskCategoryInput">
                Category:
                <input
                  type="text"
                  id="taskCategoryInput"
                  class="task-category-input"
                  required
                />
              </label>
              <label for="taskPrioritySelect">
                Priority:
                <select
                  id="taskPrioritySelect"
                  class="task-priority-select"
                  required
                >
                  <option>Low</option>
                  <option>Normal</option>
                  <option>High</option>
                </select>
              </label>
              <label for="dueByInput">
                Due By:
                <input type="date" id="dueByInput" class="due-by-date-input" />
              </label>
              <button type="submit" class="submit-btn">Add Task</button>
            </form>
          </dialog>
        </div>
      </div>
      <div class="sidebar-container">
        <nav class="sidebar-wrapper">
          <a class="all-tasks-menu menu active" href="#">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <title>home</title>
              <path d="M10,20V14H14V20H19V12H22L12,3L2,12H5V20H10Z" />
            </svg>
            <span class="menu-title">All Tasks</span>
          </a>
          <a class="today-menu menu" href="#">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              width="24"
              height="24"
            >
              <title>calendar-today</title>
              <path
                d="M7,10H12V15H7M19,19H5V8H19M19,3H18V1H16V3H8V1H6V3H5C3.89,3 3,3.9 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V5A2,2 0 0,0 19,3Z"
              />
            </svg>
            <span class="menu-title">Today</span>
          </a>
          <a class="upcoming-menu menu" href="#">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <title>calendar-import</title>
              <path
                d="M12 12L8 16H11V22H13V16H16M19 3H18V1H16V3H8V1H6V3H5C3.9 3 3 3.9 3 5V19C3 20.11 3.9 21 5 21H9V19H5V8H19V19H15V21H19C20.11 21 21 20.11 21 19V5C21 3.9 20.11 3 19 3Z"
              />
            </svg>
            <span class="menu-title">Upcoming</span>
          </a>
          <a class="overdue-menu menu" href="#">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <title>calendar-alert</title>
              <path
                d="M6 1V3H5C3.89 3 3 3.89 3 5V19C3 20.11 3.9 21 5 21H19C20.11 21 21 20.11 21 19V5C21 3.9 20.11 3 19 3H18V1H16V3H8V1H6M5 8H19V19H5V8M11 9V14H13V9H11M11 16V18H13V16H11Z"
              />
            </svg>
            <span class="menu-title">Overdue</span>
          </a>
          <a class="archive-menu menu" href="#">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <title>archive</title>
              <path
                d="M3,3H21V7H3V3M4,8H20V21H4V8M9.5,11A0.5,0.5 0 0,0 9,11.5V13H15V11.5A0.5,0.5 0 0,0 14.5,11H9.5Z"
              />
            </svg>
            <span class="menu-title">Archive</span>
          </a>
        </nav>
      </div>
      <table class="todo-list-container">
        <thead class="list-item-categories">
          <tr>
            <th></th>
            <th class="task-name table-title">
              <span class="cell-text">Task Name</span>
            </th>
            <th class="project-name table-title">Category/Project Name</th>
            <th class="priority-status table-title">Priority</th>
            <th class="due-by-date table-title">Due By</th>
            <th class="completion-status table-title">Status</th>
            <th class="created-date table-title">Created On</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td class="completion-toggle table-item">
              <input type="checkbox" />
            </td>
            <td class="task-name table-item">Clean bedroom</td>
            <td class="project-name table-item">House</td>
            <td class="priority-status table-item">Normal</td>
            <td class="due-by-date table-item">06/17/2026 12:00pm</td>
            <td class="completion-status table-item">Not Completed</td>
            <td class="created-date table-item">6/16/2026 5:00pm</td>
            <td class="task-options-wrapper">
              <a class="archive-task task-option">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                  <title>Archive Task</title>
                  <path
                    d="M3,3H21V7H3V3M4,8H20V21H4V8M9.5,11A0.5,0.5 0 0,0 9,11.5V13H15V11.5A0.5,0.5 0 0,0 14.5,11H9.5Z"
                  />
                </svg>
              </a>
              <a class="delete-task task-option">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                  <title>Delete Task</title>
                  <path
                    d="M9,3V4H4V6H5V19A2,2 0 0,0 7,21H17A2,2 0 0,0 19,19V6H20V4H15V3H9M7,6H17V19H7V6M9,8V17H11V8H9M13,8V17H15V8H13Z"
                  />
                </svg>
              </a>
              <a class="edit-task task-option" title="Edit Task">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                  <title>Edit Task</title>
                  <path
                    d="M6 2C4.9 2 4 2.9 4 4V20C4 21.1 4.9 22 6 22H10V20.1L20 10.1V8L14 2H6M13 3.5L18.5 9H13V3.5M20.1 13C20 13 19.8 13.1 19.7 13.2L18.7 14.2L20.8 16.3L21.8 15.3C22 15.1 22 14.7 21.8 14.5L20.5 13.2C20.4 13.1 20.3 13 20.1 13M18.1 14.8L12 20.9V23H14.1L20.2 16.9L18.1 14.8Z"
                  />
                </svg>
              </a>
            </td>
          </tr>
          <tr>
            <td class="completion-toggle table-item">
              <input type="checkbox" />
            </td>
            <td class="task-name table-item">Clean bedroom</td>
            <td class="project-name table-item">House</td>
            <td class="priority-status table-item">Normal</td>
            <td class="due-by-date table-item">06/17/2026 12:00pm</td>
            <td class="completion-status table-item">Not Completed</td>
            <td class="created-date table-item">6/16/2026 5:00pm</td>
            <td class="task-options-wrapper">
              <a class="archive-task task-option">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                  <title>Archive Task</title>
                  <path
                    d="M3,3H21V7H3V3M4,8H20V21H4V8M9.5,11A0.5,0.5 0 0,0 9,11.5V13H15V11.5A0.5,0.5 0 0,0 14.5,11H9.5Z"
                  />
                </svg>
              </a>
              <a class="delete-task task-option">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                  <title>Delete Task</title>
                  <path
                    d="M9,3V4H4V6H5V19A2,2 0 0,0 7,21H17A2,2 0 0,0 19,19V6H20V4H15V3H9M7,6H17V19H7V6M9,8V17H11V8H9M13,8V17H15V8H13Z"
                  />
                </svg>
              </a>
              <a class="edit-task task-option" title="Edit Task">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                  <title>Edit Task</title>
                  <path
                    d="M6 2C4.9 2 4 2.9 4 4V20C4 21.1 4.9 22 6 22H10V20.1L20 10.1V8L14 2H6M13 3.5L18.5 9H13V3.5M20.1 13C20 13 19.8 13.1 19.7 13.2L18.7 14.2L20.8 16.3L21.8 15.3C22 15.1 22 14.7 21.8 14.5L20.5 13.2C20.4 13.1 20.3 13 20.1 13M18.1 14.8L12 20.9V23H14.1L20.2 16.9L18.1 14.8Z"
                  />
                </svg>
              </a>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="footer-wrapper">
      <div class="footer">Copyright @2026 DevScissors</div>
    </div>
  </body>
</html>
