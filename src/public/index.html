<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple To Do List</title>
  </head>
  <body>
    <div class="main-container">
      <div class="header-wrapper">
        <div class="header">
          <h1 class="app-title">To Do List</h1>
          <button type="button" class="new-task-btn">Add Task</button>
          <dialog id="addNewTask" closedby="any">
            <form action="#" method="dialog" class="add-task-form">
              <label for="taskNameInput">
                Task Name:
                <input
                  type="text"
                  id="taskNameInput"
                  class="task-name-input"
                  required
                />
              </label>
              <label for="taskCategoryInput">
                Category:
                <input
                  type="text"
                  id="taskCategoryInput"
                  class="task-category-input"
                  required
                />
              </label>
              <label for="taskPrioritySelect">
                Priority:
                <select
                  id="taskPrioritySelect"
                  class="task-priority-select"
                  required
                >
                  <option value="Low">Low</option>
                  <option value="Normal">Normal</option>
                  <option value="High">High</option>
                </select>
              </label>
              <label for="dueByInput">
                Due By:
                <input
                  type="datetime-local"
                  id="dueByInput"
                  class="task-due-by-date-input"
                />
              </label>
              <button type="submit" class="submit-task-btn">Add Task</button>
            </form>
          </dialog>
        </div>
      </div>
      <div class="sidebar-container">
        <nav class="sidebar-wrapper">
          <a class="all-tasks-menu menu active" href="#">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <title>home</title>
              <path d="M10,20V14H14V20H19V12H22L12,3L2,12H5V20H10Z" />
            </svg>
            <span class="menu-title">All Tasks</span>
          </a>
          <a class="today-menu menu" href="#">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              width="24"
              height="24"
            >
              <title>calendar-today</title>
              <path
                d="M7,10H12V15H7M19,19H5V8H19M19,3H18V1H16V3H8V1H6V3H5C3.89,3 3,3.9 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V5A2,2 0 0,0 19,3Z"
              />
            </svg>
            <span class="menu-title">Today</span>
          </a>
          <a class="upcoming-menu menu" href="#">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <title>calendar-import</title>
              <path
                d="M12 12L8 16H11V22H13V16H16M19 3H18V1H16V3H8V1H6V3H5C3.9 3 3 3.9 3 5V19C3 20.11 3.9 21 5 21H9V19H5V8H19V19H15V21H19C20.11 21 21 20.11 21 19V5C21 3.9 20.11 3 19 3Z"
              />
            </svg>
            <span class="menu-title">Upcoming</span>
          </a>
          <a class="overdue-menu menu" href="#">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <title>calendar-alert</title>
              <path
                d="M6 1V3H5C3.89 3 3 3.89 3 5V19C3 20.11 3.9 21 5 21H19C20.11 21 21 20.11 21 19V5C21 3.9 20.11 3 19 3H18V1H16V3H8V1H6M5 8H19V19H5V8M11 9V14H13V9H11M11 16V18H13V16H11Z"
              />
            </svg>
            <span class="menu-title">Overdue</span>
          </a>
          <a class="archive-menu menu" href="#">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <title>archive</title>
              <path
                d="M3,3H21V7H3V3M4,8H20V21H4V8M9.5,11A0.5,0.5 0 0,0 9,11.5V13H15V11.5A0.5,0.5 0 0,0 14.5,11H9.5Z"
              />
            </svg>
            <span class="menu-title">Archive</span>
          </a>
        </nav>
      </div>
      <div class="todo-list-container">
        <table class="todo-list-table">
          <thead class="list-item-categories">
            <tr>
              <th></th>
              <th class="task-name table-title">
                <span class="cell-text">Task Name</span>
              </th>
              <th class="project-name table-title">Category/Project Name</th>
              <th class="priority-status table-title">Priority</th>
              <th class="due-by-date table-title">Due By</th>
              <th class="completion-status table-title">Status</th>
              <th class="created-date table-title">Created On</th>
              <th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
    <div class="footer-wrapper">
      <div class="footer">Copyright @2026 DevScissors</div>
    </div>
  </body>
</html>
